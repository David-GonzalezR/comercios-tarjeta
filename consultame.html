<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Consúltame — Dr. Juan Martínez</title>
<meta name="description" content="Cuéntame tu caso legal y te responderé a la brevedad." />
<meta name="theme-color" content="#05060f" />
<link rel="manifest" href="./manifest.json" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <a class="back" href="./index.html">← Volver</a>
    <h1>Consúltame</h1>
    <p class="lead">Cuéntame tu caso y te responderé lo antes posible.</p>

    <form id="contactForm" class="form-card" novalidate>
      <label for="nombre">Nombre completo</label>
      <input id="nombre" name="nombre" type="text" required placeholder="Tu nombre" />

      <label for="email">Correo electrónico</label>
      <input id="email" name="email" type="email" required placeholder="tu@correo.com" />

      <label for="telefono">Teléfono (opcional)</label>
      <input id="telefono" name="telefono" type="tel" placeholder="+57 315 634 9313" />

      <label for="mensaje">Mensaje</label>
      <textarea id="mensaje" name="mensaje" required placeholder="Describe brevemente tu consulta..."></textarea>

      <button type="submit">Enviar mensaje</button>
    </form>
  </main>

  <script src="./script.js"></script>
</body>
</html>
